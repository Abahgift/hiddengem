<!doctype html>
<html lang="en">
  <!-- -------------------------------------------
       HEAD SECTION
       =------------------------------------------- -->
  <head>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="../css/bootstrap/css/bootstrap.css" />
    <!-- Style CSS -->
    <link rel="stylesheet" href="../css/signUp.css" />

    <!-- Custom Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Radio+Canada+Big:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />

    <!-- Responsiveness -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Optimizations -->
    <title>Hidden Gems | Sign Up</title>
    <meta
      name="description"
      content="Explore hidden travel destinations across Nigeria. Discover culture, nature, and unforgettable experiences."
    />
  </head>

  <!-- --------------------------------------------
       BODY SECTION
       ------------------------------------------- -->
  <body>
    <div class="container-fluid min-vh-100">
      <div class="row bg-img">
        <div class="col-md-4"></div>
        <div class="col-md-4">
          <!-- header -->
          <div class="header col-md-12">
            <a href="homePage.html"
              ><img src="../assets/hidden_gem_logo.svg" alt="" class="logo"
            /></a>
            <a href="login.html"
              ><button type="button" class="btn btn-secondary">
                Login instead
              </button></a
            >
          </div>

          <!-- title -->
          <div>
            <h1>Sign up</h1>
            <p>
              By continuing you agree to our terms of service and privacy policy
              .
            </p>
          </div>

          <!-- sign-up form -->
          <div class="user-type col-md-12">
            <button class="btn btn-secondary">
              As Traveler
              <img
                src="../assets/signUp/tourist 2.svg"
                alt="traveler icon"
                class="icon"
              />
            </button>
            <button class="btn btn-secondary">
              As Tour Guide
              <img
                src="../assets/signUp/tour-guide 2.svg"
                alt="tour guide icon"
                class="icon"
              />
            </button>
          </div>
          <form>
            <!-- first name and last name -->
            <div class="names-wrapper col-md-12">
              <div class="mb-3 col-md-6">
                <label for="firstName" class="form-label">First Name</label>
                <input
                  type="text"
                  class="form-control"
                  id="firstName"
                  placeholder="john"
                />
              </div>
              <div class="mb-3 col-md-6">
                <label for="lastName" class="form-label">Last Name</label>
                <input
                  type="text"
                  class="form-control"
                  id="lastName"
                  placeholder="doe"
                />
              </div>
            </div>

            <!-- email -->
            <div class="mb-3">
              <label for="Email" class="form-label">Email address</label>
              <input
                type="email"
                class="form-control"
                id="Email"
                placeholder="john.doe@example.com"
                aria-describedby="emailHelp"
              />
              <div id="emailHelp" class="form-text">
                We'll never share your email with anyone else.
              </div>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                id="password"
                placeholder="••••••••"
              />
            </div>
            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="check" />
              <label class="form-check-label" for="check"
                >I accept the terms and conditions</label
              >
            </div>
            <a href="otp.html"
              ><button
                type="submit"
                class="btn btn-primary col-12 create-account"
              >
                Create Account
              </button></a
            >

            <p class="login-account text-center">
              Already have an account?
              <a href="login.html"><span class="login">Login</span></a>
            </p>
          </form>
        </div>
        <div class="col-md-4"></div>
      </div>
    </div>

    <!-- ----------------------------------------------
         JAVASCRIPT SECTIONS
         ------------------------------------------- -->
    <script src="../css/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../js/jquery-3.7.1.min.js"></script>
    <script src="../js/signUp.js"></script>
  </body>
</html>
