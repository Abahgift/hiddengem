  <head>

    <!-- Style CSS -->
    <link rel="stylesheet" href="../css/otp.css" />

    <!-- Custom Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <body>
    <div class="container-fluid min-vh-100">

        <div class="col-md-4 wrapper text-center ms-auto me-auto">
          <a href="homePage.html"

          <div class="title">

          <div class="otp-boxes">

            <div class="each-box">

            <div class="each-box">

            </div>
            <div class="each-box">
              <input type="number" class="form-control" placeholder="0" />
            </div>
          </div>

          <p class="text-start mb-5 small-text">
            Resend Code in <span class="timer">00:30</span>
          </p>
          <p class="login-account text-center">
            Already have an account?
            <a href="login.html"><span class="login">Login</span></a>

      </div>
    </div>
    <!-- ----------------------------------------------
