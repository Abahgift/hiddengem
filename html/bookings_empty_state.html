<!doctype html>
<html lang="en">
  <!-- -------------------------------------------
       HEAD SECTION
       =------------------------------------------- -->
  <head>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="../css/bootstrap/css/bootstrap.css" />
    <!-- Style CSS -->
    <link rel="stylesheet" href="../css/bookings_empty_state.css" />

    <!-- Custom Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Radio+Canada+Big:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />

    <!-- Responsiveness -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Optimizations -->
    <title>Hidden Gems | Dashboard</title>
    <meta
      name="description"
      content="Explore hidden travel destinations across Nigeria. Discover culture, nature, and unforgettable experiences."
    />
  </head>

  <!-- --------------------------------------------
       BODY SECTION
       ------------------------------------------- -->
  <body>
    <div class="container-fluid">
      <div class="row">
        <!--  HEADER IS HERE -->
        <div
          class="db_header py-2 px-5 col-md-12 d-flex justify-space-between align-items-center"
        >
          <div class="col-md-4">
            <img src="/assets/hidden_gem_logo.svg" alt="hiddenGem logo" />
          </div>
          <div
            class="col-md-4 text-center d-flex align-items-center justify-content-center"
          >
            <p class="my-auto caption">Explore</p>
          </div>
          <div
            class="col-md-4 d-flex justify-content-end align-items-center align-end"
          >
            <!--Notification -->
            <div
              class="notif_wrapper d-flex justify-content-center align-items-center me-2"
            >
              <img
                src="/assets/dashboard/notif_icon.svg"
                alt="notification icon"
              />
            </div>
            <!--Avatar Icon -->
            <div class="d-flex align-items-center">
              <img
                src="/assets/dashboard/Avatar.svg"
                alt="avatar icon"
                width="32px"
                height="32px"
                class="me-1"
              />
            </div>
            <p class="username my-auto">GiftOfGod</p>
          </div>
        </div>

        <!-- NAVBAR -->
        <div class="row my-2 d-flex justify-content-center">
          <div
            class="col-md-6 db_navbar d-flex justify-content-between align-items-center rounded-2"
          >
            <!-- NavBar Items -->

            <!-- Explore -->
            <div class="navbar_item d-flex align-items-center">
              <img
                src="/assets/dashboard/explore_inactive.svg"
                alt="explore-icon"
                class="me-2"
              />
              <p class="nav_text my-auto">Explore</p>
            </div>

            <!-- Guides -->
            <div class="navbar_item d-flex align-items-center">
              <img
                src="/assets/dashboard/guides_inactive.svg"
                alt="guides-icon"
                class="me-2"
              />
              <p class="nav_text my-auto">Guides</p>
            </div>

            <!-- Bookings -->
            <div class="navbar_item_active d-flex align-items-center">
              <img
                src="/assets/dashboard/booking_active.svg"
                alt="bookings-icon"
                class="me-2"
              />
              <p class="nav_text_active my-auto">Bookings</p>
            </div>

            <!-- Profile -->
            <div class="navbar_item d-flex align-items-center">
              <img
                src="/assets/dashboard/profile_inactive.svg"
                alt="myprofile-icon"
                class="me-2"
              />
              <p class="nav_text my-auto">My Profile</p>
            </div>
          </div>
        </div>

        <!-- MAIN CONTENT - BOOKINGS -->
        <!-- heading -->
        <div class="row">
          <div class="col-md-12 px-5">
            <div class="col-md-8">
              <h1>My Bookings</h1>
              <p>Track your upcoming and past adventures</p>
            </div>
          </div>
          <!-- filter pills -->
          <div class="filter_pill_wrapper mb-5 px-5">
            <span class="filter_pill_active">Upcoming (0)</span>
            <span class="filter_pill">Past (0)</span>
            <span class="filter_pill">Cancelled (0)</span>
          </div>
        </div>

        <!-- The Bookings -->
        <div class="row">
          <div class="col-md-12 px-5 py-5 d-flex justify-content-center">
            <div
              class="wrapper d-flex flex-column justify-content-center align-items-center"
            >
              <img
                src="/assets/dashboard/booking_confirmation.svg"
                alt="booking empty state image"
                width="70px"
                height="70px"
                class="mb-2"
              />
              <p class="text-center">No upcoming trips</p>
              <button class="btn btn-primary">Explore destinations</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- ----------------------------------------------
         JAVASCRIPT SECTIONS
         ------------------------------------------- -->
    <script src="../css/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../js/jquery-3.7.1.min.js"></script>
    <script src="../js/dashboard.js"></script>
  </body>
</html>
